<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinShop Aesthetic Rich Menu</title>
    <style>
        :root {
            --bg-color: #fdfcf8; /* 柔和奶油色 */
            --border-color: #eeebe3; /* 極淺邊框 */
            --text-main: #6b665f; /* 質感深灰棕 */
            --text-sub: #b2ada3; /* 淺可可色 */
            --icon-color: #c9c2b5; /* 插圖顏色 */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
        }

        /* LINE 選單容器 (模擬 2500x1686 比例) */
        .rich-menu {
            width: 100%;
            max-width: 600px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 200px);
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 0.5px solid var(--border-color);
            position: relative;
            background-color: var(--bg-color);
        }

        /* 插圖樣式 */
        .icon {
            width: 45px;
            height: 45px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 12px;
        }

        /* 主文字 */
        .label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        /* 底部裝飾線 */
        .decoration {
            font-size: 10px;
            color: var(--text-sub);
            letter-spacing: 2px;
            margin-top: 2px;
        }

    </style>
</head>
<body>

    <div class="rich-menu">
        <div class="menu-item">
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
            <div class="label">每日結單群</div>
            <div class="decoration">── ⋆ ──</div>
        </div>

        <div class="menu-item">
            <svg class="icon" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0"/></svg>
            <div class="label">批發/小幫手</div>
            <div class="decoration">── ⋆ ──</div>
        </div>

        <div class="menu-item">
            <svg class="icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <div class="label">代理詢問</div>
            <div class="decoration">── ⋆ ──</div>
        </div>

        <div class="menu-item">
            <svg class="icon" viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
            <div class="label">下單方式詢問</div>
            <div class="decoration">── ⋆ ──</div>
        </div>

        <div class="menu-item">
            <svg class="icon" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <div class="label">主要群組詢問</div>
            <div class="decoration">── ⋆ ──</div>
        </div>

        <div class="menu-item">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <div class="label">常見問題</div>
            <div class="decoration">── ⋆ ──</div>
        </div>
    </div>

</body>
</html>
